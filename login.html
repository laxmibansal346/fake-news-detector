<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fake News Detector</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <h1>Fake News Detector</h1>
        <p>Login to your account</p>

        <div id="login-form">
            <input type="text" id="login-email" placeholder="Enter your email" />
            <input type="password" id="login-password" placeholder="Enter your password" />
            <button id="login-btn">Login</button>
            <p class="switch-text">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
        </div>

        <div id="signup-form" style="display:none;">
            <input type="text" id="signup-name" placeholder="Enter your name" />
            <input type="text" id="signup-email" placeholder="Enter your email" />
            <input type="password" id="signup-password" placeholder="Enter your password" />
            <button id="signup-btn">Sign Up</button>
            <p class="switch-text">Already have an account? <a href="#" id="show-login">Login</a></p>
        </div>

        <div id="auth-result"></div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
